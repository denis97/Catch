<!DOCTYPE html>

  #root { height: 100%; }
  @keyframes catchPulse {
    0%   { transform: scale(0.8); opacity: 0.55; }
    70%  { transform: scale(2.6); opacity: 0; }
    100% { opacity: 0; }

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',

      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px' }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>

    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{ display: 'flex', alignItems: 'center', minHeight: 52, padding: '0 16px', position: 'relative', fontFamily: '-apple-system, system-ui', fontSize: 17, letterSpacing: -0.43 }}>
      {icon && <div style={{ width: 30, height: 30, borderRadius: 7, background: icon, marginRight: 12, flexShrink: 0 }} />}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && <div style={{ position: 'absolute', bottom: 0, right: 0, left: icon ? 58 : 16, height: 0.5, background: sep }} />}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && <div style={{ fontFamily: '-apple-system, system-ui', fontSize: 13, color: hc, textTransform: 'uppercase', padding: '8px 36px 6px', letterSpacing: -0.08 }}>{header}</div>}
      <div style={{ background: bg, borderRadius: 26, margin: '0 16px', overflow: 'hidden' }}>{children}</div>
    </div>
  );
}

function IOSDevice({ children, width = 402, height = 874, dark = false, title, keyboard = false }) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden', position: 'relative',
      background: dark ? '#000' : '#F2F2F7',

}

function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };
  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{ height: 42, borderRadius: 8.5, flex: flex ? 1 : undefined, width: w, minWidth: 0, background: ret ? '#08f' : keyBg, boxShadow: '0 1px 0 rgba(0,0,0,0.075)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: '-apple-system, "SF Compact", system-ui', fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph }}>{content}</div>
  );
  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );
  return (
    <div style={{ position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden', padding: '11px 0 2px', display: 'flex', flexDirection: 'column', alignItems: 'center', boxShadow: dark ? '0 -2px 20px rgba(0,0,0,0.09)' : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)' }}>
      <div style={{ position: 'absolute', inset: 0, borderRadius: 27, backdropFilter: 'blur(12px) saturate(180%)', WebkitBackdropFilter: 'blur(12px) saturate(180%)', background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)' }} />
      <div style={{ position: 'absolute', inset: 0, borderRadius: 27, boxShadow: dark ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)' : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)', border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)', pointerEvents: 'none' }} />
      <div style={{ display: 'flex', gap: 20, alignItems: 'center', padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box', position: 'relative' }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{ flex: 1, textAlign: 'center', fontFamily: '-apple-system, system-ui', fontSize: 17, color: sugg, letterSpacing: -0.43, lineHeight: '22px' }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 13, padding: '0 6.5px', width: '100%', boxSizing: 'border-box', position: 'relative' }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => { const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s); return m === undefined ? s : typeof m === 'object' ? m.value : m; };
    return <TweakSelect label={label} value={value} options={options} onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

function buildSeries(d, count = 6) {
  const baseDepart = parseMin(d.depart);
  const rideTail = d.duration - d.walk;
  const out = [];
  for (let i = 0; i < count; i++) {
    const depart = baseDepart + i * d.every;
    const leaveMin = depart - d.walk;
    out.push({ i, depart: fmtClock(depart), arrive: fmtClock(depart + rideTail), leave: fmtClock(leaveMin), leaveIn: leaveMin - NOW_MIN, rec: i === 0 });
  }
  return out;
}

    <div key={key} style={{ display: 'inline-flex', alignItems: 'center', gap: 4, height: 24, padding: '0 8px', borderRadius: 7, background: color ? color : t.chipBg, color: color ? '#fff' : t.textSec, fontSize: 12.5, fontWeight: color ? 700 : 600 }}>
      {React.createElement(MODE_ICON[mode], { size: 14, style: { strokeWidth: 1.9 } })}
      <span>{label}</span>
    </div>
  );
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 5, flexWrap: 'wrap' }}>
      {legs.map((leg, i) => {
        const [mode, min, line] = leg;
        const meta = line ? (LINES[line] || {}) : {};
        const node = mode === 'walk' ? pill('walk', `${min}`, null, i) : pill(mode, compact ? line : `${line}`, meta.color, i);
        return <React.Fragment key={i}>{i > 0 && sep}{node}</React.Fragment>;
      })}
    </div>
  );
}

function Places({ t, platform, onBack, openDetail }) {
  const dz = densityTokens(t._density);
  const anchors = PLACES.filter((p) => p.kind === 'home' || p.kind === 'work');
  const favs = PLACES.filter((p) => p.kind === 'star');
  const go = (p) => openDetail(p.kind === 'work' ? WORK_DEPS[0] : HOME_DEPS[0]);
  return (
    <div style={{ fontFamily: t.family, paddingBottom: 28 }}>
      <BackBar t={t} platform={platform} title="Places" sub="Home & Work power your suggestions" onBack={onBack}
        trailing={<IconTile t={t} size={38} radius={19} bg={t.accentSoft} color={t.accent}><IconPlus size={20} /></IconTile>} />
      <div style={{ padding: `0 ${dz.cardPad}px` }}>
        <SectionLabel t={t}>Anchors</SectionLabel>
        <Card t={t} style={{ padding: '2px 0', marginBottom: dz.sectionGap }}>
          {anchors.map((p, i) => <PlaceRow key={p.id} t={t} place={p} onClick={() => go(p)} isLast={i === anchors.length - 1} />)}
        </Card>
        <SectionLabel t={t}>Favorites</SectionLabel>
        <Card t={t} style={{ padding: '2px 0' }}>
          {favs.map((p, i) => <PlaceRow key={p.id} t={t} place={p} onClick={() => go(p)} isLast={i === favs.length - 1} />)}
        </Card>
        <button onClick={onBack} style={{ appearance: 'none', cursor: 'pointer', width: '100%', marginTop: dz.sectionGap, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, height: 50, borderRadius: 16, border: `1.5px dashed ${t.border}`, background: 'transparent', color: t.textSec, fontFamily: t.family, fontSize: 15, fontWeight: 600 }}>

        </button>
      </div>
    </div>
  );
}

// ─── TransitApp.jsx ───────────────────────────────────────────

function TransitApp({ t, platform, screen, setScreen, dest, setDest, detail, setDetail }) {
  const openDetail = (d) => { setDetail(d); setScreen('detail'); };
  const goHome = () => setScreen('home');
  let content;
  if (screen === 'onboarding') content = <Onboarding t={t} platform={platform} onFinish={goHome} />;
  else if (screen === 'widget') content = <WidgetHome t={t} platform={platform} />;
  else if (screen === 'detail') content = <LeaveTimes t={t} platform={platform} d={detail || HOME_DEPS[0]} onBack={goHome} />;
  else if (screen === 'places') content = <Places t={t} platform={platform} onBack={goHome} openDetail={openDetail} />;
  else content = <Home t={t} platform={platform} dest={dest} setDest={setDest} openDetail={openDetail} />;
  return <div style={{ minHeight: '100%', background: t.pageBg, color: t.text }}>{content}</div>;
}

// ─── Catch.html app shell ─────────────────────────────────────

const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2AA198",
  "dark": true,
  "font": "Hanken Grotesk",
  "density": "comfy"
}/*EDITMODE-END*/;

const SCREENS = [
  { id: 'onboarding', label: 'Welcome' },
  { id: 'home',       label: 'Home' },
  { id: 'detail',     label: 'When to leave' },
  { id: 'places',     label: 'Places' },
  { id: 'widget',     label: 'Widget' },
];

function load(key, fallback) {
  try { const v = localStorage.getItem('catch_' + key); return v == null ? fallback : v; }
  catch (e) { return fallback; }
}
function save(key, v) { try { localStorage.setItem('catch_' + key, v); } catch (e) {} }

function useFit(groupW, groupH, topChrome) {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const fit = () => {
      const availW = window.innerWidth - 56;
      const availH = window.innerHeight - topChrome - 48;
      setScale(Math.min(availW / groupW, availH / groupH, 1));
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, [groupW, groupH, topChrome]);
  return scale;
}

function PhoneLabel({ children, accent }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 14, fontSize: 13, fontWeight: 600, color: '#6b7480', letterSpacing: 0.2 }}>
      <span style={{ width: 7, height: 7, borderRadius: 99, background: accent }} />
      {children}
    </div>
  );
}

function Chip({ active, accent, onClick, children }) {
  return (
    <button onClick={onClick} style={{ appearance: 'none', border: 'none', cursor: 'pointer', height: 36, padding: '0 16px', borderRadius: 11, background: active ? '#11181c' : '#fff', color: active ? '#fff' : '#3a434d', fontSize: 14, fontWeight: 600, letterSpacing: 0.1, boxShadow: active ? 'none' : '0 1px 2px rgba(16,20,24,0.06)' }}>{children}</button>
  );
}

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreenRaw] = useState(load('screen', 'home'));
  const [dest, setDestRaw] = useState(load('dest', 'home'));
  const [detail, setDetail] = useState(HOME_DEPS[0]);

  const setScreen = (s) => { setScreenRaw(s); save('screen', s); if (s === 'detail' && !detail) setDetail(HOME_DEPS[0]); };
  const setDest = (d) => { setDestRaw(d); save('dest', d); };

  const tIOS = { ...buildTheme(tw, 'ios'), _density: tw.density };
  const tAnd = { ...buildTheme(tw, 'android'), _density: tw.density };

  const GROUP_W = 402 + 56 + 412;
  const GROUP_H = 28 + 874;
  const TOP_CHROME = 132;
  const scale = useFit(GROUP_W, GROUP_H, TOP_CHROME);

  const phoneProps = { screen, setScreen, dest, setDest, detail, setDetail };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ flexShrink: 0, padding: '20px 28px 0' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
          <div style={{ width: 30, height: 30, borderRadius: 9, background: tw.accent, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <IconArrowR size={18} style={{ color: '#fff', strokeWidth: 2.6 }} />
          </div>
          <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.4, color: '#11181c' }}>Catch</div>
          <div style={{ fontSize: 14, color: '#8a929b', fontWeight: 500 }}>Know exactly when to leave — iOS &amp; Android</div>
        </div>
        <div style={{ display: 'flex', gap: 8, marginTop: 16, flexWrap: 'wrap' }}>
          {SCREENS.map((s) => (
            <Chip key={s.id} active={screen === s.id} accent={tw.accent}
              onClick={() => { if (s.id === 'detail') setDetail(HOME_DEPS[0]); setScreen(s.id); }}>
              {s.label}
            </Chip>
          ))}
        </div>
      </div>

      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
          <div style={{ display: 'flex', gap: 56, alignItems: 'flex-start' }}>
            <div>
              <PhoneLabel accent={tw.accent}>iOS · iPhone</PhoneLabel>
              <div className="phone-scroll">
                <IOSDevice dark={tw.dark}>
                  <TransitApp t={tIOS} platform="ios" {...phoneProps} />
                </IOSDevice>
              </div>
            </div>
            <div>
              <PhoneLabel accent={tw.accent}>Android · Pixel</PhoneLabel>
              <div className="phone-scroll">
                <AndroidDevice dark={tw.dark}>
                  <TransitApp t={tAnd} platform="android" {...phoneProps} />
                </AndroidDevice>
              </div>
            </div>
          </div>
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakColor label="Accent" value={tw.accent}
          options={['#0E9F6E', '#2AA198', '#2D6CDF', '#5B5BD6']}
          onChange={(v) => setTweak('accent', v)} />
        <TweakToggle label="Dark mode" value={tw.dark} onChange={(v) => setTweak('dark', v)} />
        <TweakSection label="Type" />
        <TweakSelect label="Font" value={tw.font}
          options={['Native', 'Hanken Grotesk', 'Schibsted Grotesk']}
          onChange={(v) => setTweak('font', v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={tw.density}
          options={['compact', 'regular', 'comfy']}
          onChange={(v) => setTweak('density', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
