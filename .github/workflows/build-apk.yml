name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Caches and reuses Gradle wrapper + dependency downloads between runs
      - uses: gradle/actions/setup-gradle@v4

      # cache: true caches the Flutter SDK + pub packages
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.2
          channel: stable
          cache: true

      # The pinned NDK 27 is ~600 MB to download; cache it
      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/27.0.12077973
          key: ndk-27.0.12077973

      - name: Get dependencies
        run: flutter pub get

      - name: Inject API key
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -n "$GOOGLE_MAPS_API_KEY" ]; then
            echo "const String kGoogleMapsApiKey = '$GOOGLE_MAPS_API_KEY';" > lib/config.dart
          fi

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/catch-release.jks"
            {
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "storeFile=$RUNNER_TEMP/catch-release.jks"
            } > android/key.properties
            echo "Release signing configured from secrets."
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret — release build will fall back to debug signing."
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: catch-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
