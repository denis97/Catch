name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Caches and reuses Gradle wrapper + dependency downloads between runs
      - uses: gradle/actions/setup-gradle@v4

      # cache: true caches the Flutter SDK + pub packages
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.2
          channel: stable
          cache: true

      # The pinned NDK 27 is ~600 MB to download; cache it
      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/27.0.12077973
          key: ndk-27.0.12077973

      - name: Get dependencies
        run: flutter pub get

      - name: Inject API key
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -n "$GOOGLE_MAPS_API_KEY" ]; then
            echo "const String kGoogleMapsApiKey = '$GOOGLE_MAPS_API_KEY';" > lib/config.dart
          fi

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: catch-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
