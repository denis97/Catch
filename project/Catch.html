<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catch — when to leave</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Schibsted+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #e7eaee;
    font-family: -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { height: 100%; }
  @keyframes catchPulse {
    0%   { transform: scale(0.8); opacity: 0.55; }
    70%  { transform: scale(2.6); opacity: 0; }
    100% { opacity: 0; }
  }
  /* hide inner phone scrollbars */
  .phone-scroll ::-webkit-scrollbar { width: 0; height: 0; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="frames/android-frame.jsx"></script>
<script type="text/babel" src="frames/tweaks-panel.jsx"></script>

<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/kit.jsx"></script>
<script type="text/babel" src="app/screens-home.jsx"></script>
<script type="text/babel" src="app/screens-detail.jsx"></script>
<script type="text/babel" src="app/screens-onboarding.jsx"></script>
<script type="text/babel" src="app/screens-places.jsx"></script>
<script type="text/babel" src="app/screens-widget.jsx"></script>
<script type="text/babel" src="app/TransitApp.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2AA198",
  "dark": true,
  "font": "Hanken Grotesk",
  "density": "comfy"
}/*EDITMODE-END*/;

const SCREENS = [
  { id: 'onboarding', label: 'Welcome' },
  { id: 'home',       label: 'Home' },
  { id: 'detail',     label: 'When to leave' },
  { id: 'places',     label: 'Places' },
  { id: 'widget',     label: 'Widget' },
];

function load(key, fallback) {
  try { const v = localStorage.getItem('catch_' + key); return v == null ? fallback : v; }
  catch (e) { return fallback; }
}
function save(key, v) { try { localStorage.setItem('catch_' + key, v); } catch (e) {} }

// Scales the two-phone group to fit the viewport.
function useFit(groupW, groupH, topChrome) {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const fit = () => {
      const availW = window.innerWidth - 56;
      const availH = window.innerHeight - topChrome - 48;
      setScale(Math.min(availW / groupW, availH / groupH, 1));
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, [groupW, groupH, topChrome]);
  return scale;
}

function PhoneLabel({ children, accent }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 7, marginBottom: 14,
      fontSize: 13, fontWeight: 600, color: '#6b7480', letterSpacing: 0.2,
    }}>
      <span style={{ width: 7, height: 7, borderRadius: 99, background: accent }} />
      {children}
    </div>
  );
}

function Chip({ active, accent, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      appearance: 'none', border: 'none', cursor: 'pointer',
      height: 36, padding: '0 16px', borderRadius: 11,
      background: active ? '#11181c' : '#fff',
      color: active ? '#fff' : '#3a434d',
      fontSize: 14, fontWeight: 600, letterSpacing: 0.1,
      boxShadow: active ? 'none' : '0 1px 2px rgba(16,20,24,0.06)',
    }}>{children}</button>
  );
}

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreenRaw] = useState(load('screen', 'home'));
  const [dest, setDestRaw] = useState(load('dest', 'home'));
  const [detail, setDetail] = useState(HOME_DEPS[0]);

  const setScreen = (s) => { setScreenRaw(s); save('screen', s); if (s === 'detail' && !detail) setDetail(HOME_DEPS[0]); };
  const setDest = (d) => { setDestRaw(d); save('dest', d); };

  const tIOS = { ...buildTheme(tw, 'ios'), _density: tw.density };
  const tAnd = { ...buildTheme(tw, 'android'), _density: tw.density };

  const GROUP_W = 402 + 56 + 412; // ios + gap + android
  const GROUP_H = 28 + 874;
  const TOP_CHROME = 132;
  const scale = useFit(GROUP_W, GROUP_H, TOP_CHROME);

  const phoneProps = { screen, setScreen, dest, setDest, detail, setDetail };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* top chrome */}
      <div style={{ flexShrink: 0, padding: '20px 28px 0' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
          <div style={{ width: 30, height: 30, borderRadius: 9, background: tw.accent,
            display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <IconArrowR size={18} style={{ color: '#fff', strokeWidth: 2.6 }} />
          </div>
          <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.4, color: '#11181c' }}>Catch</div>
          <div style={{ fontSize: 14, color: '#8a929b', fontWeight: 500 }}>Know exactly when to leave — iOS &amp; Android</div>
        </div>
        <div style={{ display: 'flex', gap: 8, marginTop: 16, flexWrap: 'wrap' }}>
          {SCREENS.map((s) => (
            <Chip key={s.id} active={screen === s.id} accent={tw.accent}
              onClick={() => { if (s.id === 'detail') setDetail(HOME_DEPS[0]); setScreen(s.id); }}>
              {s.label}
            </Chip>
          ))}
        </div>
      </div>

      {/* stage */}
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
        <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
          <div style={{ display: 'flex', gap: 56, alignItems: 'flex-start' }}>
            <div>
              <PhoneLabel accent={tw.accent}>iOS · iPhone</PhoneLabel>
              <div className="phone-scroll">
                <IOSDevice dark={tw.dark}>
                  <TransitApp t={tIOS} platform="ios" {...phoneProps} />
                </IOSDevice>
              </div>
            </div>
            <div>
              <PhoneLabel accent={tw.accent}>Android · Pixel</PhoneLabel>
              <div className="phone-scroll">
                <AndroidDevice dark={tw.dark}>
                  <TransitApp t={tAnd} platform="android" {...phoneProps} />
                </AndroidDevice>
              </div>
            </div>
          </div>
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakColor label="Accent" value={tw.accent}
          options={['#0E9F6E', '#2AA198', '#2D6CDF', '#5B5BD6']}
          onChange={(v) => setTweak('accent', v)} />
        <TweakToggle label="Dark mode" value={tw.dark} onChange={(v) => setTweak('dark', v)} />
        <TweakSection label="Type" />
        <TweakSelect label="Font" value={tw.font}
          options={['Native', 'Hanken Grotesk', 'Schibsted Grotesk']}
          onChange={(v) => setTweak('font', v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={tw.density}
          options={['compact', 'regular', 'comfy']}
          onChange={(v) => setTweak('density', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
